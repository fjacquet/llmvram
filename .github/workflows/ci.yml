name: Continuous Integration

on:
  push:
    branches: [maincd]
  pull_request:
    branches: [maincd]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm ci
      - name: Run tests
        run: npx vitest run
      - name: Run type checking
        run: npm run typecheck
      - name: Run linting
        run: npm run lint

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm ci
      - name: Run npm audit
        # Advisory: Snyk (below) is already non-blocking. npm audit hard-fails on
        # transitive CVEs with no per-PR Dependabot fix, so keep it informational
        # rather than red-lighting dependency PRs on unrelated tree CVEs.
        continue-on-error: true
        run: npm audit --audit-level=high
      - name: Run Snyk security scan
        run: npx snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true
