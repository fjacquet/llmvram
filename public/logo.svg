<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Background -->
  <rect width="200" height="60" rx="8" fill="#1e1b4b"/>

  <!-- GPU chip icon -->
  <rect x="10" y="14" width="32" height="32" rx="4" fill="#6366f1"/>
  <!-- Chip grid -->
  <line x1="16" y1="14" x2="16" y2="46" stroke="#4338ca" stroke-width="0.8"/>
  <line x1="22" y1="14" x2="22" y2="46" stroke="#4338ca" stroke-width="0.8"/>
  <line x1="28" y1="14" x2="28" y2="46" stroke="#4338ca" stroke-width="0.8"/>
  <line x1="34" y1="14" x2="34" y2="46" stroke="#4338ca" stroke-width="0.8"/>
  <line x1="10" y1="22" x2="42" y2="22" stroke="#4338ca" stroke-width="0.8"/>
  <line x1="10" y1="30" x2="42" y2="30" stroke="#4338ca" stroke-width="0.8"/>
  <line x1="10" y1="38" x2="42" y2="38" stroke="#4338ca" stroke-width="0.8"/>
  <!-- Pins top -->
  <rect x="13" y="9" width="3" height="5" rx="1" fill="#a5b4fc"/>
  <rect x="20" y="9" width="3" height="5" rx="1" fill="#a5b4fc"/>
  <rect x="27" y="9" width="3" height="5" rx="1" fill="#a5b4fc"/>
  <rect x="34" y="9" width="3" height="5" rx="1" fill="#a5b4fc"/>
  <!-- Pins bottom -->
  <rect x="13" y="46" width="3" height="5" rx="1" fill="#a5b4fc"/>
  <rect x="20" y="46" width="3" height="5" rx="1" fill="#a5b4fc"/>
  <rect x="27" y="46" width="3" height="5" rx="1" fill="#a5b4fc"/>
  <rect x="34" y="46" width="3" height="5" rx="1" fill="#a5b4fc"/>
  <!-- Center core -->
  <rect x="20" y="22" width="12" height="16" rx="2" fill="#818cf8" opacity="0.8"/>

  <!-- Text: LLM VRAM -->
  <text x="52" y="28" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="700" fill="#a5b4fc" letter-spacing="1">LLM VRAM</text>
  <!-- Text: Calculator -->
  <text x="52" y="46" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="400" fill="#6366f1" letter-spacing="0.5">Calculator</text>
</svg>
